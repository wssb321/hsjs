<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- 引入css文件 -->
        <link rel="stylesheet" href="./login.css">
        <!-- 引入jquery -->
        <script src="http://code.jquery.com/jquery-latest.js"></script>
        <title>登录</title>
    </head>
    <body>
        <!-- 视频背景 -->
        <video class="bg-video" autoplay muted loop>
            <source src="./宣传.mp4" type="video/mp4">
            您的浏览器不支持视频播放
        </video>
        <!-- 最外层的大盒子 -->
       <div class="box">
        <!-- 滑动盒子 -->
        <div class="pre-box">
            <h1>WELCOME</h1>
            <p>JOIN US!</p>
            <div class="img-box">
                <img src="./img/waoku.jpg" alt="">
            </div>
        </div>
        <!-- 注册盒子 -->
        <div class="register-form">
            <!-- 标题盒子 -->
            <div class="title-box">
                <h1>注册</h1>
            </div>
            <!-- 输入框盒子 -->
            <div class="input-box">
                <input type="text" placeholder="用户名">
                <input type="password" placeholder="密码">
                <input type="password" placeholder="确认密码">
            </div>
            <!-- 按钮盒子 -->
            <div class="btn-box">
                <button>注册</button>
                <!-- 绑定点击事件 -->
                <p onclick="mySwitch()">已有账号?去登录</p>
            </div>
        </div>
        <!-- 登录盒子 -->
        <div class="login-form">
            <!-- 标题盒子 -->
            <div class="title-box">
                <h1>登录</h1>
            </div>
            <!-- 输入框盒子 -->
            <div class="input-box">
                <input type="text" placeholder="用户名">
                <input type="password" placeholder="密码">
            </div>
            <!-- 按钮盒子 -->
            <div class="btn-box">
                <button>登录</button>
                <!-- 绑定点击事件 -->
                <p onclick="mySwitch()">没有账号?去注册</p>
            </div>
        </div>
       </div>
       <script>
            // 滑动的状态
             let flag=true
             const mySwitch=()=>{
                // 检测屏幕宽度
                const screenWidth = window.innerWidth;
                
                if(flag){
                    if(screenWidth <= 480) {
                        // 移动设备：垂直滑动
                        $(".pre-box").css("transform","translateY(-100%)")
                        $(".pre-box").addClass("active")
                    } else {
                        // 桌面设备：水平滑动
                        $(".pre-box").css("transform","translateX(100%)")
                    }
                    // 修改背景颜色
                    $(".pre-box").css("background-color","#c9e0ed")
                    // 修改图片的路径
                    $("img").attr("src","./img/wuwu.jpeg")
                    
                }
                else {
                    if(screenWidth <= 480) {
                        // 移动设备：垂直滑动
                        $(".pre-box").css("transform","translateY(0%)")
                        $(".pre-box").removeClass("active")
                    } else {
                        // 桌面设备：水平滑动
                        $(".pre-box").css("transform","translateX(0%)")
                    }
                    // 修改背景颜色
                    $(".pre-box").css("background-color","#edd4dc")
                    // 修改图片的路径
                    $("img").attr("src","./img/waoku.jpg")
                }
                flag=!flag
             }
             
             // 创建错误提示元素
            const createErrorMessage = (message) => {
                // 先移除已有的错误提示
                const existingError = document.querySelector('.error-message');
                if (existingError) {
                    existingError.remove();
                }
                
                // 创建新的错误提示元素
                const errorElement = document.createElement('div');
                errorElement.className = 'error-message';
                errorElement.textContent = message;
                
                // 添加到body
                document.body.appendChild(errorElement);
                
                // 3秒后移除错误提示
                setTimeout(() => {
                    errorElement.remove();
                }, 3000);
            };
            
            // 处理登录
             const handleLogin = () => {
                const username = document.querySelector('.login-form input[type="text"]').value;
                const password = document.querySelector('.login-form input[type="password"]').value;
                
                if (!username || !password) {
                    createErrorMessage('请填写用户名和密码');
                    return;
                }
                
                // 存储登录状态到localStorage
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('username', username);
                
                // 跳转到Vue应用
                window.location.href = 'http://localhost:5173';
             };
             
             // 处理注册
             const handleRegister = () => {
                const username = document.querySelector('.register-form input[type="text"]').value;
                const password = document.querySelector('.register-form input[type="password"]').value;
                const confirmPassword = document.querySelector('.register-form input[type="password"]:nth-child(3)').value;
                
                if (!username || !password || !confirmPassword) {
                    createErrorMessage('请填写所有字段');
                    return;
                }
                
                if (password !== confirmPassword) {
                    createErrorMessage('两次输入的密码不一致');
                    return;
                }
                
                // 存储登录状态到localStorage
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('username', username);
                
                // 跳转到Vue应用
                window.location.href = 'http://localhost:5173';
             };
             
             // 绑定登录和注册按钮的点击事件
             document.addEventListener('DOMContentLoaded', function() {
                document.querySelector('.login-form button').addEventListener('click', handleLogin);
                document.querySelector('.register-form button').addEventListener('click', handleRegister);
             });
       </script>
       <script>
            const bubleCreate=()=>{
                // 获取body元素
                const body = document.body
                // 创建泡泡元素
                const buble = document.createElement('span')
                // 设置泡泡半径
                let r = Math.random()*5 + 25 //半径大小为25~30
                // 设置泡泡的宽高
                buble.style.width=r+'px'
                buble.style.height=r+'px'
                // 设置泡泡的随机起点
                buble.style.left=Math.random()*innerWidth+'px'
                // 为body添加buble元素
                body.append(buble)
                // 4s清除一次泡泡
                setTimeout(()=>{
                    buble.remove()
                },4000)
            }
            // 每200ms生成一个泡泡
            setInterval(() => {
                bubleCreate()
            }, 200);
        </script>
    </body>
</html>
